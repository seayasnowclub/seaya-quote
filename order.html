<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訂單收據系統 — Seaya Snow Club</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf3e6;
    --surface: #fffaf3;
    --border: #ecdfc8;
    --accent: #f1703b;
    --accent-soft: rgba(241,112,59,0.12);
    --text: #5a4636;
    --muted: #a4907b;
    --success: #6f8c5f;
    --success-soft: rgba(111,140,95,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "PingFang TC", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px 80px;
  }

  .container { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 12px; }

  header { padding: 8px 0 20px; }
  .brand-logo { height: 52px; display: block; margin-bottom: 12px; }
  header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  header p { margin-top: 6px; font-size: 13px; color: var(--muted); }

  .tabs { display: flex; gap: 8px; }
  .tab-btn {
    flex: 1; padding: 12px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); font-weight: 600; font-size: 14px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .tab-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }

  .card-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }

  .field { margin-bottom: 14px; min-width: 0; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field input[type=text], .field input[type=number], .field input[type=date], .field select, .field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .btn-group:last-child { margin-bottom: 0; }
  .opt-btn {
    flex: 1; min-width: 64px;
    padding: 10px 8px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--muted);
    font-size: 14px; font-family: inherit;
    cursor: pointer; text-align: center;
    transition: all 0.15s; line-height: 1.4;
  }
  .opt-btn:hover { border-color: var(--accent); color: var(--text); }
  .opt-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .quick-btn {
    flex: 1; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--muted);
    font-size: 12px; font-family: inherit;
    cursor: pointer; transition: all 0.15s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  .stepper-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .stepper-row:last-child { margin-bottom: 0; }
  .stepper-row label { font-size: 14px; color: var(--text); }
  .stepper {
    display: flex; align-items: center;
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  .step-btn {
    width: 38px; height: 38px; border: none;
    background: var(--bg); color: var(--muted);
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .step-btn:hover { background: var(--border); color: var(--text); }
  .step-val {
    min-width: 42px; text-align: center;
    font-size: 15px; font-weight: 600; color: var(--text);
    background: var(--bg);
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    height: 38px; display: flex; align-items: center; justify-content: center;
  }

  .primary-btn {
    width: 100%; padding: 14px; margin-top: 4px;
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: opacity 0.15s;
  }
  .primary-btn:hover { opacity: 0.9; }

  .note {
    margin-top: 10px; font-size: 12px; color: var(--muted);
    padding: 10px 14px; background: var(--bg); border-radius: 10px;
    line-height: 1.6;
  }
  .note.accent { color: var(--accent); font-weight: 500; }

  /* 收據 */
  .receipt-card {
    background: var(--surface); border: 1px dashed var(--accent);
    border-radius: 14px; padding: 24px;
  }
  .receipt-header { text-align: center; margin-bottom: 16px; }
  .receipt-header img { height: 44px; margin-bottom: 8px; }
  .receipt-header h2 { font-size: 17px; font-weight: 700; }
  .receipt-meta { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.8; }

  .receipt-section { margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border); }
  .receipt-section h3 {
    font-size: 11px; color: var(--accent); letter-spacing: 0.1em;
    margin-bottom: 10px; text-transform: uppercase; font-weight: 700;
  }
  .receipt-row { display: flex; justify-content: space-between; gap: 12px; font-size: 14px; margin-bottom: 6px; line-height: 1.6; }
  .receipt-row:last-child { margin-bottom: 0; }
  .receipt-row .label { color: var(--muted); flex-shrink: 0; }
  .receipt-row .value { text-align: right; white-space: pre-line; }

  .receipt-total {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 18px; font-weight: 700; margin-top: 12px;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .receipt-total.deposit { color: var(--success); }

  .receipt-footer {
    text-align: center; font-size: 11px; color: var(--muted);
    margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--border);
    line-height: 1.8;
  }

  @media print {
    body * { visibility: hidden; }
    .receipt-card, .receipt-card * { visibility: visible; }
    .receipt-card { position: absolute; left: 0; top: 0; width: 100%; border: none; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="container">

  <header>
    <img class="brand-logo" src="images/logo.png" alt="Seaya Snow Club">
    <h1>訂單收據系統</h1>
    <p>內部使用：訂金確認登記與收據開立</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tabNew">開立收據</button>
    <button class="tab-btn" id="tabLookup">查詢收據</button>
  </div>

  <!-- ===== 開立收據 ===== -->
  <div id="newOrderTab">

    <div class="card">
      <div class="card-title">客人資訊</div>
      <div class="field">
        <label>姓名</label>
        <input type="text" id="custName" placeholder="例如：王小明">
      </div>
      <div class="field-row">
        <div class="field">
          <label>聯繫方式</label>
          <select id="custContactType">
            <option value="IG">Instagram</option>
            <option value="LINE">LINE</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="field" style="flex:2">
          <label>帳號 / ID</label>
          <input type="text" id="custContact" placeholder="例如：@ooorange33">
        </div>
      </div>
      <div class="field">
        <label>LINE 暱稱（方便對帳聯繫）</label>
        <input type="text" id="custLineNick" placeholder="例如：小明">
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="card-title">課程</div>
      <div id="groupList"></div>
      <button type="button" id="addGroupBtn" class="quick-btn" style="width:100%; margin-top:12px; padding:10px; font-size:13px; color:var(--accent); border-color:var(--accent)">＋ 新增課程組</button>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="card-title" style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0">
        <span>住宿 — 六花 Rokka Inn</span>
        <label style="display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer; text-transform:none; letter-spacing:0; font-weight:600; color:var(--muted)">
          <input type="checkbox" id="includeRoom" style="width:auto; margin:0">
          包含住宿
        </label>
      </div>
      <div id="roomBody" style="display:none; margin-top:16px">
        <div class="btn-group">
          <div class="group-label">房型</div>
          <button class="opt-btn active" data-group="roomType" data-val="six">六疊房</button>
          <button class="opt-btn" data-group="roomType" data-val="eight">八疊房</button>
          <button class="opt-btn" data-group="roomType" data-val="washitsu">大和室</button>
        </div>
        <div class="stepper-row">
          <label>間數</label>
          <div class="stepper">
            <button class="step-btn" data-action="dec" data-target="roomCount">−</button>
            <div class="step-val" id="roomCountVal">1</div>
            <button class="step-btn" data-action="inc" data-target="roomCount">＋</button>
          </div>
        </div>
        <div class="stepper-row">
          <label>晚數</label>
          <div class="stepper">
            <button class="step-btn" data-action="dec" data-target="roomNights">−</button>
            <div class="step-val" id="roomNightsVal">2</div>
            <button class="step-btn" data-action="inc" data-target="roomNights">＋</button>
          </div>
        </div>
        <div class="field-row" style="margin-top:14px">
          <div class="field">
            <label>入住日期</label>
            <input type="date" id="checkInDate" min="2026-12-01" max="2027-04-30">
          </div>
          <div class="field">
            <label>退房日期</label>
            <input type="date" id="checkOutDate" min="2026-12-01" max="2027-04-30">
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="card-title" style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0">
        <span>雪具加購 — Good Good 好好雪倉</span>
        <label style="display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer; text-transform:none; letter-spacing:0; font-weight:600; color:var(--muted)">
          <input type="checkbox" id="includeGear" style="width:auto; margin:0">
          包含雪具
        </label>
      </div>
      <div id="gearBody" style="display:none; margin-top:16px">
        <div class="stepper-row">
          <label>加購人數</label>
          <div class="stepper">
            <button class="step-btn" data-action="dec" data-target="gearPersons">−</button>
            <div class="step-val" id="gearPersonsVal">1</div>
            <button class="step-btn" data-action="inc" data-target="gearPersons">＋</button>
          </div>
        </div>
        <div class="stepper-row">
          <label>租借天數</label>
          <div class="stepper">
            <button class="step-btn" data-action="dec" data-target="gearDays">−</button>
            <div class="step-val" id="gearDaysVal">2</div>
            <button class="step-btn" data-action="inc" data-target="gearDays">＋</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="card-title">金額與付款</div>
      <div class="field-row">
        <div class="field">
          <label>總金額（NT$）</label>
          <input type="number" id="totalAmount" placeholder="0">
        </div>
        <div class="field">
          <label>已收訂金（NT$）</label>
          <input type="number" id="depositAmount" placeholder="0">
          <div style="display:flex; gap:6px; margin-top:6px">
            <button type="button" class="quick-btn" data-deposit-pct="30">訂金 30%</button>
            <button type="button" class="quick-btn" data-deposit-pct="50">訂金 50%</button>
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>尾款金額（NT$）</label>
          <input type="number" id="balanceAmount" placeholder="0">
        </div>
        <div class="field">
          <label>尾款繳款期限</label>
          <input type="date" id="balanceDue" min="2026-11-01" max="2027-04-30">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>付款方式</label>
          <select id="paymentMethod">
            <option value="虛擬帳號">虛擬帳號</option>
            <option value="匯款">匯款</option>
          </select>
        </div>
        <div class="field">
          <label>帳號末五碼</label>
          <input type="text" id="paymentLast5" placeholder="例如：12345" maxlength="5" inputmode="numeric">
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="card-title">備註</div>
      <div class="field">
        <label>客製化需求</label>
        <textarea id="customNote" placeholder="例如：素食、租用兒童雪具、加開接駁時間等"></textarea>
      </div>
      <div class="field">
        <label>退款條款</label>
        <textarea id="refundNote">開課日前 61 日以前（不含開課日）取消，退回已收款項 60%。開課日前 60 日至 30 天前，退回已收款項 40%。開課前 30 天至當日不接受取消（可轉讓給友人），雪具費用如有退款，另依當次政策計算。如需異動，請及早與客服聯繫。</textarea>
      </div>
    </div>

    <button class="primary-btn" id="generateBtn" style="margin-top:4px">產生收據</button>
  </div>

  <!-- ===== 查詢收據 ===== -->
  <div id="lookupTab" style="display:none">
    <div class="card">
      <div class="card-title">查詢收據</div>
      <div class="field">
        <label>收據編號</label>
        <input type="text" id="lookupId" placeholder="例如：SEA261215-001">
      </div>
      <button class="primary-btn" id="lookupBtn">查詢</button>
      <div class="note accent" id="lookupMsg" style="display:none"></div>
    </div>
  </div>

  <!-- ===== 收據預覽（開立／查詢共用） ===== -->
  <div class="receipt-card" id="receiptCard" style="display:none; margin-top:12px">
    <div class="receipt-header">
      <img src="images/logo.png" alt="Seaya Snow Club">
      <h2>訂金確認收據</h2>
      <div class="receipt-meta">
        收據編號：<span id="rcNo"></span><br>
        開立日期：<span id="rcDate"></span>
      </div>
    </div>

    <div class="receipt-section">
      <h3>客人資訊</h3>
      <div class="receipt-row"><span class="label">姓名</span><span class="value" id="rcName"></span></div>
      <div class="receipt-row"><span class="label">聯繫方式</span><span class="value" id="rcContact"></span></div>
    </div>

    <div class="receipt-section">
      <h3>行程內容</h3>
      <div class="receipt-row"><span class="label">地點</span><span class="value" id="rcLocation"></span></div>
      <div class="receipt-row"><span class="label">課程</span><span class="value" id="rcCourse"></span></div>
      <div class="receipt-row"><span class="label">住宿</span><span class="value" id="rcRoom"></span></div>
      <div class="receipt-row"><span class="label">雪具</span><span class="value" id="rcGear"></span></div>
    </div>

    <div class="receipt-section">
      <h3>費用明細</h3>
      <div class="receipt-row"><span class="label">總金額</span><span class="value" id="rcTotal"></span></div>
      <div class="receipt-total deposit"><span>已收訂金</span><span id="rcDeposit"></span></div>
      <div class="receipt-row" style="margin-top:10px"><span class="label">尾款</span><span class="value" id="rcBalance"></span></div>
      <div class="receipt-row"><span class="label">繳款期限</span><span class="value" id="rcBalanceDue"></span></div>
      <div class="receipt-row"><span class="label">付款方式</span><span class="value" id="rcPayment"></span></div>
    </div>

    <div class="receipt-section" id="rcCustomNoteSection">
      <h3>備註</h3>
      <div style="font-size:13px; line-height:1.7" id="rcCustomNote"></div>
    </div>

    <div class="receipt-section">
      <h3>退款條款</h3>
      <div style="font-size:12px; line-height:1.7; color:var(--muted)" id="rcRefundNote"></div>
    </div>

    <div class="receipt-footer">
      逐光旅行戶外工作室<br>
      佐倉マネジメント株式会社
    </div>
  </div>

  <button class="primary-btn" id="downloadBtn" style="display:none; margin-top:12px; background:var(--success)">下載收據圖片</button>
  <div class="note" id="printHint" style="display:none">收據可截圖傳給客人，或按「下載收據圖片」存成 PNG，也可用瀏覽器「列印」功能另存成 PDF。</div>

</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwW9nIvabWvERu6ZjzxJ2-4lUX94IHLeAcyt21Aj9gKnj9hcZt1reISkuYXjVa7nABY/exec';
  const API_SECRET = 'seayasnow2026';
  const DEFAULT_REFUND_NOTE = '開課日前 61 日以前（不含開課日）取消，退回已收款項 60%。開課日前 60 日至 30 天前，退回已收款項 40%。開課前 30 天至當日不接受取消（可轉讓給友人），雪具費用如有退款，另依當次政策計算。如需異動，請及早與客服聯繫。';

  const O = {
    groups: [{ location: 'yuzawa', board: 'single', persons: 1, days: 1, isRange: false, date: '', dateStart: '', dateEnd: '' }],
    includeRoom: false, roomType: 'six', roomCount: 1, roomNights: 2,
    includeGear: false, gearPersons: 1, gearDays: 2
  };

  const stepCfg = {
    roomCount:   { min: 0, max: 8  },
    roomNights:  { min: 0, max: 14 },
    gearPersons: { min: 0, max: 4  },
    gearDays:    { min: 0, max: 14 }
  };

  const LOCATION_LABEL = { zao: '藏王', yuzawa: '湯澤' };
  const BOARD_LABEL = { single: '單板', double: '雙板' };
  const PERSON_LABEL = { 1: '一對一', 2: '一對二', 3: '一對三', 4: '一對四', 5: '一對五' };
  const ROOM_NAME    = { six: '六疊房', eight: '八疊房', washitsu: '大和室' };

  function el(id) { return document.getElementById(id); }
  function fmt(n) { return 'NT$ ' + (Number(n) || 0).toLocaleString('zh-TW'); }

  const WEEKDAYS = ['日','一','二','三','四','五','六'];
  function formatDate(str) {
    if (!str) return '';
    const d = new Date(str + 'T00:00:00');
    return `${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）`;
  }
  function nowDisplay() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  // Google Sheet 回傳的時間可能被自動轉成 ISO 字串（UTC），需轉回台北時間顯示
  function formatCreatedAt(value) {
    if (typeof value === 'string' && /^\d{4}\/\d{1,2}\/\d{1,2} \d{2}:\d{2}$/.test(value)) return value;
    const d = new Date(value);
    if (isNaN(d.getTime())) return String(value);
    const t = new Date(d.getTime() + 8 * 3600 * 1000);
    const pad = n => String(n).padStart(2, '0');
    return `${t.getUTCFullYear()}/${t.getUTCMonth()+1}/${t.getUTCDate()} ${pad(t.getUTCHours())}:${pad(t.getUTCMinutes())}`;
  }

  // 收據顯示文字組合（開立／查詢共用）
  function buildContactDisplay(contactType, contact, lineNick) {
    return `${contactType} ${contact || '—'}` + (lineNick ? `（LINE 暱稱：${lineNick}）` : '');
  }
  function buildCourseDisplay(groups) {
    if (!groups || groups.length === 0) return '—';
    return groups.map((g, i) => {
      const prefix = groups.length > 1 ? `第 ${i+1} 組：` : '';
      const board = BOARD_LABEL[g.board] || '';
      const persons = PERSON_LABEL[g.persons] || `一對${g.persons}`;
      const days = formatDays(g.days);
      let dateInfo = '';
      if (g.isRange) {
        const s = formatDate(g.dateStart), en = formatDate(g.dateEnd);
        dateInfo = (s && en) ? `${s} － ${en}` : (s || en || '');
      } else {
        dateInfo = formatDate(g.date);
      }
      return `${prefix}${board ? board + '・' : ''}${persons}・${days}${dateInfo ? '（' + dateInfo + '）' : ''}`;
    }).join('\n');
  }
  function buildLocationDisplay(groups) {
    if (!groups || groups.length === 0) return '—';
    const locs = groups.map(g => LOCATION_LABEL[g.location] || g.location);
    const unique = [...new Set(locs)];
    if (unique.length === 1) return unique[0];
    return groups.map((g, i) => `第${i+1}組 ${LOCATION_LABEL[g.location]}`).join('・');
  }
  function buildCourseDisplay_legacy(personLabel, courseDays, courseDateInfo) {
    if (!courseDays) return personLabel || '—';
    return `${personLabel}・全日 ${courseDays} 天${courseDateInfo ? '（' + courseDateInfo + '）' : ''}`;
  }
  function buildRoomDisplay(roomLabel, roomCount, roomNights, checkIn, checkOut) {
    if (!roomCount || !roomNights) return '未含住宿';
    const range = (checkIn || checkOut) ? `（入住 ${checkIn || '—'} － 退房 ${checkOut || '—'}）` : '';
    return `${roomLabel} × ${roomCount} 間 × ${roomNights} 晚${range}`;
  }
  function buildGearDisplay(gearPersons, gearDays) {
    return gearPersons > 0 ? `${gearPersons} 人 × ${gearDays} 天` : '未加購';
  }
  function buildPaymentDisplay(method, last5) {
    return method + (last5 ? `（末五碼 ${last5}）` : '');
  }

  function autoEndDate(i) {
    const g = O.groups[i];
    if (!g.isRange || !g.dateStart) return;
    const d = new Date(g.dateStart + 'T00:00:00');
    d.setDate(d.getDate() + Math.max(0, Math.ceil(g.days) - 1));
    const pad = n => String(n).padStart(2, '0');
    const val = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    g.dateEnd = val;
    const inp = el('groupList').querySelector(`.grp-date-end[data-idx="${i}"]`);
    if (inp) inp.value = val;
  }

  function updateBalanceDue() {
    const g = O.groups[0];
    const base = g.isRange ? g.dateStart : g.date;
    if (!base) return;
    const d = new Date(base + 'T00:00:00');
    d.setDate(d.getDate() - 30);
    const pad = n => String(n).padStart(2, '0');
    el('balanceDue').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  // 課程組
  function formatDays(n) {
    if (!n) return '0 天';
    const full = Math.floor(n);
    const half = (n % 1) >= 0.5;
    if (full === 0) return '半天';
    return half ? `${full} 天半` : `${full} 天`;
  }

  function buildGroupHTML(g, idx) {
    const opts = [1,2,3,4,5].map(n =>
      `<option value="${n}" ${g.persons === n ? 'selected' : ''}>${PERSON_LABEL[n]}</option>`
    ).join('');
    return `
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px">
        <span style="font-size:13px; font-weight:600; color:var(--text)">第 ${idx+1} 組</span>
        ${idx > 0 ? `<button type="button" class="remove-group-btn" data-idx="${idx}" style="font-size:12px; color:var(--muted); border:none; background:none; cursor:pointer; padding:4px">✕ 移除</button>` : ''}
      </div>
      <div class="field-row">
        <div class="field">
          <label>地點</label>
          <select class="grp-location" data-idx="${idx}">
            <option value="zao" ${g.location==='zao'?'selected':''}>藏王</option>
            <option value="yuzawa" ${g.location==='yuzawa'?'selected':''}>湯澤</option>
          </select>
        </div>
        <div class="field">
          <label>板類</label>
          <select class="grp-board" data-idx="${idx}">
            <option value="single" ${g.board==='single'?'selected':''}>單板</option>
            <option value="double" ${g.board==='double'?'selected':''}>雙板</option>
          </select>
        </div>
        <div class="field">
          <label>師生比</label>
          <select class="grp-persons" data-idx="${idx}">${opts}</select>
        </div>
      </div>
      <div class="stepper-row" style="margin-top:4px">
        <label>天數</label>
        <div class="stepper">
          <button type="button" class="step-btn grp-dec" data-idx="${idx}">−</button>
          <div class="step-val" id="grpDays${idx}">${formatDays(g.days)}</div>
          <button type="button" class="step-btn grp-inc" data-idx="${idx}">＋</button>
        </div>
      </div>
      <div style="margin-top:14px">
        <div style="display:flex; align-items:center; margin-bottom:6px">
          <label style="margin:0; font-size:13px; color:var(--muted); flex:1">上課日期</label>
          <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); cursor:pointer; margin:0">
            <input type="checkbox" class="grp-is-range" data-idx="${idx}" style="width:auto; margin:0" ${g.isRange?'checked':''}>
            區間
          </label>
        </div>
        <input type="date" class="grp-date" data-idx="${idx}" min="2026-12-01" max="2027-04-30" value="${g.date}" ${g.isRange?'style="display:none"':''}>
        <div class="field-row grp-range-row" data-idx="${idx}" style="${g.isRange?'display:flex':'display:none'}; margin-top:6px">
          <div class="field" style="margin-bottom:0">
            <label>開始</label>
            <input type="date" class="grp-date-start" data-idx="${idx}" min="2026-12-01" max="2027-04-30" value="${g.dateStart}">
          </div>
          <div class="field" style="margin-bottom:0">
            <label>結束</label>
            <input type="date" class="grp-date-end" data-idx="${idx}" min="2026-12-01" max="2027-04-30" value="${g.dateEnd}">
          </div>
        </div>
      </div>`;
  }

  function bindGroupEvents() {
    el('groupList').querySelectorAll('.grp-location').forEach(s => {
      s.onchange = () => { O.groups[+s.dataset.idx].location = s.value; };
    });
    el('groupList').querySelectorAll('.grp-board').forEach(s => {
      s.onchange = () => { O.groups[+s.dataset.idx].board = s.value; };
    });
    el('groupList').querySelectorAll('.grp-persons').forEach(s => {
      s.onchange = () => { O.groups[+s.dataset.idx].persons = +s.value; };
    });
    el('groupList').querySelectorAll('.grp-dec').forEach(btn => {
      btn.onclick = () => {
        const i = +btn.dataset.idx;
        O.groups[i].days = Math.max(0.5, +(O.groups[i].days - 0.5).toFixed(1));
        el(`grpDays${i}`).textContent = formatDays(O.groups[i].days);
        autoEndDate(i);
      };
    });
    el('groupList').querySelectorAll('.grp-inc').forEach(btn => {
      btn.onclick = () => {
        const i = +btn.dataset.idx;
        O.groups[i].days = Math.min(14, +(O.groups[i].days + 0.5).toFixed(1));
        el(`grpDays${i}`).textContent = formatDays(O.groups[i].days);
        autoEndDate(i);
      };
    });
    el('groupList').querySelectorAll('.grp-is-range').forEach(cb => {
      cb.onchange = () => {
        const i = +cb.dataset.idx;
        O.groups[i].isRange = cb.checked;
        el('groupList').querySelector(`.grp-date[data-idx="${i}"]`).style.display = cb.checked ? 'none' : '';
        el('groupList').querySelector(`.grp-range-row[data-idx="${i}"]`).style.display = cb.checked ? 'flex' : 'none';
        if (i === 0) updateBalanceDue();
      };
    });
    el('groupList').querySelectorAll('.grp-date').forEach(inp => {
      inp.onchange = () => {
        const i = +inp.dataset.idx;
        O.groups[i].date = inp.value;
        if (i === 0) updateBalanceDue();
      };
    });
    el('groupList').querySelectorAll('.grp-date-start').forEach(inp => {
      inp.onchange = () => {
        const i = +inp.dataset.idx;
        O.groups[i].dateStart = inp.value;
        autoEndDate(i);
        if (i === 0) updateBalanceDue();
      };
    });
    el('groupList').querySelectorAll('.grp-date-end').forEach(inp => {
      inp.onchange = () => { O.groups[+inp.dataset.idx].dateEnd = inp.value; };
    });
    el('groupList').querySelectorAll('.remove-group-btn').forEach(btn => {
      btn.onclick = () => { O.groups.splice(+btn.dataset.idx, 1); renderGroups(); };
    });
  }

  function renderGroups() {
    const list = el('groupList');
    list.innerHTML = '';
    O.groups.forEach((g, idx) => {
      const div = document.createElement('div');
      if (idx > 0) {
        div.style.borderTop = '1px dashed var(--border)';
        div.style.paddingTop = '16px';
        div.style.marginTop = '16px';
      }
      div.innerHTML = buildGroupHTML(g, idx);
      list.appendChild(div);
    });
    bindGroupEvents();
  }

  renderGroups();

  el('addGroupBtn').addEventListener('click', () => {
    O.groups.push({ location: 'yuzawa', board: 'single', persons: 1, days: 1, isRange: false, date: '', dateStart: '', dateEnd: '' });
    renderGroups();
  });

  // 按鈕群組（住宿房型）
  document.querySelectorAll('.opt-btn[data-group]').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.dataset.group;
      document.querySelectorAll(`.opt-btn[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      O[group] = btn.dataset.val;
    });
  });

  // 步進器（住宿 / 雪具）
  document.querySelectorAll('.step-btn[data-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.target;
      if (!stepCfg[t]) return;
      let val = btn.dataset.action === 'inc'
        ? Math.min(O[t] + 1, stepCfg[t].max)
        : Math.max(O[t] - 1, stepCfg[t].min);
      O[t] = val;
      el(t + 'Val').textContent = val;
      if (t === 'roomNights') updateCheckOutDate();
    });
  });

  // 尾款自動帶入
  function autoBalance() {
    const total = Number(el('totalAmount').value) || 0;
    const deposit = Number(el('depositAmount').value) || 0;
    el('balanceAmount').value = Math.max(total - deposit, 0);
  }
  el('totalAmount').addEventListener('input', autoBalance);
  el('depositAmount').addEventListener('input', autoBalance);

  // 訂金快速計算（總金額 × 30% / 50%）
  document.querySelectorAll('[data-deposit-pct]').forEach(btn => {
    btn.addEventListener('click', () => {
      const total = Number(el('totalAmount').value) || 0;
      const pct = Number(btn.dataset.depositPct);
      el('depositAmount').value = Math.round(total * pct / 100);
      autoBalance();
    });
  });

  // 入住日期 + 晚數 → 自動帶入退房日期
  function updateCheckOutDate() {
    const ci = el('checkInDate').value;
    if (!ci) return;
    const d = new Date(ci + 'T00:00:00');
    d.setDate(d.getDate() + O.roomNights);
    const pad = n => String(n).padStart(2, '0');
    el('checkOutDate').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  el('checkInDate').addEventListener('change', updateCheckOutDate);

  el('includeRoom').addEventListener('change', () => {
    O.includeRoom = el('includeRoom').checked;
    el('roomBody').style.display = O.includeRoom ? 'block' : 'none';
  });
  el('includeGear').addEventListener('change', () => {
    O.includeGear = el('includeGear').checked;
    el('gearBody').style.display = O.includeGear ? 'block' : 'none';
  });

  // 收據編號（後台無回應時的備援暫時編號）
  function genReceiptNo() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `SEA${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}`;
  }

  // 收據渲染（開立／查詢共用）
  function renderReceipt(data) {
    el('rcNo').textContent = data.receiptNo;
    el('rcDate').textContent = data.createdAt;
    el('rcName').textContent = data.custName || '—';
    el('rcContact').textContent = data.contactDisplay;
    el('rcLocation').textContent = data.locationDisplay || '—';
    el('rcCourse').textContent = data.courseDisplay;
    el('rcRoom').textContent = data.roomDisplay;
    el('rcGear').textContent = data.gearDisplay;
    el('rcTotal').textContent = fmt(data.totalAmount);
    el('rcDeposit').textContent = fmt(data.depositAmount);
    el('rcBalance').textContent = fmt(data.balanceAmount);
    el('rcBalanceDue').textContent = data.balanceDueDisplay || '—';
    el('rcPayment').textContent = data.paymentDisplay;

    if (data.note) {
      el('rcCustomNote').textContent = data.note;
      el('rcCustomNoteSection').style.display = 'block';
    } else {
      el('rcCustomNoteSection').style.display = 'none';
    }
    el('rcRefundNote').textContent = data.refundNote || DEFAULT_REFUND_NOTE;

    el('receiptCard').style.display = 'block';
    el('downloadBtn').style.display = 'block';
    el('printHint').style.display = 'block';
    el('receiptCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  el('generateBtn').addEventListener('click', async () => {
    const contactType = el('custContactType').value;
    const contact = el('custContact').value || '—';
    const lineNick = el('custLineNick').value.trim();

    const ci = formatDate(el('checkInDate').value);
    const co = formatDate(el('checkOutDate').value);
    const balanceDueDisplay = formatDate(el('balanceDue').value);
    const paymentMethod = el('paymentMethod').value;
    const last5 = el('paymentLast5').value.trim();
    const customNote = el('customNote').value.trim();
    const refundNote = el('refundNote').value;
    const total = Number(el('totalAmount').value) || 0;
    const deposit = Number(el('depositAmount').value) || 0;
    const balance = Number(el('balanceAmount').value) || 0;

    const courseSummary = O.groups.map(g =>
      `${LOCATION_LABEL[g.location]}・${BOARD_LABEL[g.board] || ''}・${PERSON_LABEL[g.persons] || '一對'+g.persons}・${formatDays(g.days)}`
    ).join('；');
    const totalCourseDays = +O.groups.reduce((s, g) => s + g.days, 0).toFixed(1);
    const courseDateSummary = O.groups.map(g => {
      if (g.isRange) {
        const s = formatDate(g.dateStart), en = formatDate(g.dateEnd);
        return (s && en) ? `${s}－${en}` : (s || en || '');
      }
      return formatDate(g.date);
    }).join('；');

    const payload = {
      secret: API_SECRET,
      custName: el('custName').value || '—',
      location: O.groups[0].location,
      contactType, contact, lineNick,
      coursePersons: courseSummary,
      courseDays: totalCourseDays,
      courseDateInfo: courseDateSummary,
      roomType: ROOM_NAME[O.roomType],
      roomCount: O.includeRoom ? O.roomCount : 0,
      roomNights: O.includeRoom ? O.roomNights : 0,
      checkInDate: O.includeRoom ? ci : '',
      checkOutDate: O.includeRoom ? co : '',
      gearPersons: O.includeGear ? O.gearPersons : 0,
      gearDays: O.includeGear ? O.gearDays : 0,
      totalAmount: total,
      depositAmount: deposit,
      balanceAmount: balance,
      balanceDue: balanceDueDisplay,
      paymentMethod,
      paymentLast5: last5,
      note: customNote
    };

    const btn = el('generateBtn');
    btn.disabled = true;
    btn.textContent = '處理中…';

    let receiptNo;
    try {
      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      receiptNo = json.receiptNo;
    } catch (err) {
      alert('寫入後台失敗（' + err.message + '），這筆訂單尚未存進 Google Sheet，收據編號為暫時編號，請手動補登。');
      receiptNo = genReceiptNo();
    } finally {
      btn.disabled = false;
      btn.textContent = '產生收據';
    }

    renderReceipt({
      receiptNo, createdAt: nowDisplay(),
      custName: payload.custName,
      contactDisplay: buildContactDisplay(contactType, contact, lineNick),
      locationDisplay: buildLocationDisplay(O.groups),
      courseDisplay: buildCourseDisplay(O.groups),
      roomDisplay: buildRoomDisplay(payload.roomType, payload.roomCount, payload.roomNights, ci, co),
      gearDisplay: buildGearDisplay(payload.gearPersons, payload.gearDays),
      totalAmount: total, depositAmount: deposit, balanceAmount: balance,
      balanceDueDisplay,
      paymentDisplay: buildPaymentDisplay(paymentMethod, last5),
      note: customNote,
      refundNote
    });
  });

  // 下載收據圖片
  el('downloadBtn').addEventListener('click', () => {
    html2canvas(el('receiptCard'), { backgroundColor: '#fffaf3', scale: 2 }).then(canvas => {
      const link = document.createElement('a');
      link.download = `seaya_receipt_${el('rcNo').textContent}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  });

  // Tabs
  el('tabNew').addEventListener('click', () => {
    el('tabNew').classList.add('active');
    el('tabLookup').classList.remove('active');
    el('newOrderTab').style.display = 'block';
    el('lookupTab').style.display = 'none';
  });
  el('tabLookup').addEventListener('click', () => {
    el('tabLookup').classList.add('active');
    el('tabNew').classList.remove('active');
    el('lookupTab').style.display = 'block';
    el('newOrderTab').style.display = 'none';
  });

  // 查詢收據
  el('lookupBtn').addEventListener('click', async () => {
    const receiptNo = el('lookupId').value.trim();
    const msg = el('lookupMsg');
    msg.style.display = 'none';
    el('receiptCard').style.display = 'none';
    el('downloadBtn').style.display = 'none';
    el('printHint').style.display = 'none';

    if (!receiptNo) {
      msg.textContent = '請輸入收據編號';
      msg.style.display = 'block';
      return;
    }

    const btn = el('lookupBtn');
    btn.disabled = true;
    btn.textContent = '查詢中…';

    try {
      const url = `${API_URL}?secret=${encodeURIComponent(API_SECRET)}&receiptNo=${encodeURIComponent(receiptNo)}`;
      const res = await fetch(url);
      const row = await res.json();
      if (row.error) throw new Error(row.error);

      renderReceipt({
        receiptNo: row['收據編號'],
        createdAt: formatCreatedAt(row['建立時間']),
        custName: row['姓名'],
        contactDisplay: buildContactDisplay(row['聯繫方式'], row['帳號/ID'], row['LINE暱稱']),
        locationDisplay: row['地點'] || '—',
        courseDisplay: buildCourseDisplay_legacy(row['課程人數'], row['課程天數'], row['上課日期']),
        roomDisplay: buildRoomDisplay(row['房型'], row['間數'], row['晚數'], row['入住日期'], row['退房日期']),
        gearDisplay: buildGearDisplay(row['雪具人數'], row['雪具天數']),
        totalAmount: row['總金額'], depositAmount: row['已收訂金'], balanceAmount: row['尾款金額'],
        balanceDueDisplay: row['尾款期限'],
        paymentDisplay: buildPaymentDisplay(row['付款方式'], row['末五碼']),
        note: row['備註']
      });
    } catch (err) {
      msg.textContent = '查詢失敗：' + err.message;
      msg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = '查詢';
    }
  });
</script>
</body>
</html>
